name: Weekly Calendar Refresh

# Tops up the rolling topic queue every Monday. Requires DATABASE_URL to point
# at a persistent Postgres instance — SQLite in the runner's ephemeral
# filesystem would not survive between runs.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Run calendar agent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          NICHE: ${{ vars.NICHE }}
          SEED_KEYWORDS: ${{ vars.SEED_KEYWORDS }}
        run: |
          blog-pipeline init-db
          blog-pipeline run-calendar

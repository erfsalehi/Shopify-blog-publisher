name: Weekly Calendar Refresh

# Tops up the rolling topic queue every Monday. Requires DATABASE_URL to point
# at a persistent Postgres instance — SQLite in the runner's ephemeral
# filesystem would not survive between runs.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        # [postgres] pulls psycopg — DATABASE_URL here is always Postgres
        # (the sqlite default can't survive an ephemeral runner).
        run: pip install -e ".[postgres]"
      - name: Run calendar agent
        # An unset secret/var arrives here as "" rather than absent; config.py
        # maps blank to unset, so anything not configured falls back to its
        # default in Settings instead of failing to parse.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LINEAR_TEAM: ${{ vars.LINEAR_TEAM }}
          LINEAR_PROJECT: ${{ vars.LINEAR_PROJECT }}
          # ── Existing-post import (backfill.py), for dedup
          # Read-only here: import-existing only lists posts. The store's back
          # catalogue is invisible to dedup without this, so research
          # re-proposes topics already published.
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          # Sets the URL imported rows are stored under — must be the public
          # domain, since that's what Search Console reports pages as.
          PUBLIC_DOMAIN: ${{ vars.PUBLIC_DOMAIN }}
          # ── Search Console (performance.py) — striking-distance research
          # input, and the decay signal refresh ranks candidates by. Optional:
          # unset just means research falls back to market data alone.
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL }}
          # ── GA4 — whether AI assistants send anyone here. Search Console
          # can't see this: it covers Google Search only. Credentials fall back
          # to the Search Console key, so usually only the property id is set.
          GA4_PROPERTY_ID: ${{ vars.GA4_PROPERTY_ID }}
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          # ── Topic research inputs (agents/topic_research.py, seed_research.py)
          NICHE: ${{ vars.NICHE }}
          SEED_KEYWORDS: ${{ vars.SEED_KEYWORDS }}
          COMPETITOR_URLS: ${{ vars.COMPETITOR_URLS }}
          # Both research agents fold business_location into their keywords
          # when local_seo is on. Without it the queue skews national/generic
          # — the job still succeeds, it just researches the wrong market.
          LOCAL_SEO: ${{ vars.LOCAL_SEO }}
          BUSINESS_LOCATION: ${{ vars.BUSINESS_LOCATION }}
          # ── Queue shape (graphs/calendar_graph.py)
          CADENCE: ${{ vars.CADENCE }}
          COVERAGE_TARGET_WEEKS: ${{ vars.COVERAGE_TARGET_WEEKS }}
        run: |
          blog-pipeline init-db
          # Before researching, not after: dedup compares against this table,
          # so importing later would let this run's topics duplicate posts
          # already on the store. Also catches anything published by hand in
          # Shopify since the last refresh.
          blog-pipeline import-existing
          # After import (pages join to articles by URL), before research
          # (striking-distance queries are an input to it). No-ops when
          # Search Console isn't configured.
          blog-pipeline sync-performance
          # AI referral sessions. No-ops when GA4 isn't configured. Not an
          # input to research — it's the record of whether the GEO work pays.
          blog-pipeline sync-analytics
          blog-pipeline run-calendar

name: Daily Draft

# Drafts every calendar entry due today and syncs each one to Linear. Days
# with nothing due are a no-op, so this can run daily regardless of cadence.
# Requires a persistent DATABASE_URL (Postgres) as above.

on:
  schedule:
    - cron: "0 14 * * *" # every day 14:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print payloads instead of syncing to Linear"
        type: boolean
        default: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        # [postgres] pulls psycopg — DATABASE_URL here is always Postgres
        # (the sqlite default can't survive an ephemeral runner).
        run: pip install -e ".[postgres]"
      - name: Run daily draft
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM: ${{ vars.LINEAR_TEAM }}
          LINEAR_PROJECT: ${{ vars.LINEAR_PROJECT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_BLOG_ID: ${{ secrets.SHOPIFY_BLOG_ID }}
          ENABLE_SHOPIFY_PUBLISH: ${{ vars.ENABLE_SHOPIFY_PUBLISH }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: |
          blog-pipeline init-db
          blog-pipeline run-daily ${{ inputs.dry_run && '--dry-run' || '' }}

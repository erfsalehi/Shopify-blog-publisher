name: Daily Publish

# Drafts and publishes every calendar entry due today. Days with nothing due
# are a no-op, so this can run daily regardless of cadence. Requires a
# persistent DATABASE_URL (Postgres) as above.

on:
  schedule:
    - cron: "0 14 * * *" # every day 14:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print payloads instead of publishing"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Run daily publish
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_BLOG_ID: ${{ secrets.SHOPIFY_BLOG_ID }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          GATE_MODE: ${{ vars.GATE_MODE }}
        run: |
          blog-pipeline init-db
          blog-pipeline run-daily ${{ inputs.dry_run && '--dry-run' || '' }}
